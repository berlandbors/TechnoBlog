    <script>
        // Переключение темы
        const themeToggle = document.createElement('button');
        themeToggle.className = 'theme-toggle';
        themeToggle.innerHTML = '[⚙]';
        themeToggle.title = 'Переключить тему';
        themeToggle.setAttribute('aria-label', 'Переключить тему');
        document.body.appendChild(themeToggle);
        
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('darkTheme', isDark);
            themeToggle.innerHTML = isDark ? '[☀]' : '[☽]';
        });
        
        // Проверка сохраненной темы
        if (localStorage.getItem('darkTheme') === 'true') {
            document.body.classList.add('dark-theme');
            themeToggle.innerHTML = '[☀]';
        } else {
            themeToggle.innerHTML = '[☽]';
        }

        // === Режим чтения ===
        function toggleReaderMode() {
            const isReaderMode = document.body.classList.toggle('reader-mode');
            localStorage.setItem('readerMode', isReaderMode);

            if (isReaderMode) {
                document.querySelector('.pagination').style.display = 'none';
                document.querySelector('.search-container').style.display = 'none';
                document.getElementById('articleContent').style.fontSize = '18px';
                document.getElementById('articleContent').style.lineHeight = '1.8';
            } else {
                document.querySelector('.pagination').style.display = 'flex';
                document.querySelector('.search-container').style.display = 'block';
                document.getElementById('articleContent').style.fontSize = '';
                document.getElementById('articleContent').style.lineHeight = '';
            }
        }

        // Кнопка режима чтения в модальном окне
        const readerButton = document.createElement('button');
        readerButton.textContent = '📖 Режим чтения';
        readerButton.id = 'readerModeBtn';
        readerButton.title = 'Режим чтения (Ctrl+R)';
        readerButton.setAttribute('aria-label', 'Режим чтения');
        readerButton.onclick = toggleReaderMode;
        document.querySelector('#articleModal .modal-content').appendChild(readerButton);

        // Горячая клавиша Ctrl/Cmd+R для режима чтения
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
                if (document.getElementById('articleModal').style.display === 'block') {
                    e.preventDefault();
                    toggleReaderMode();
                }
            }
        });

        // Восстановление режима чтения из localStorage
        if (localStorage.getItem('readerMode') === 'true') {
            document.body.classList.add('reader-mode');
        }

        // === Прогресс-бар чтения ===
        window.addEventListener('scroll', () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
            document.getElementById('reading-progress').style.width = scrolled + '%';
        });

        // === Кнопка "Наверх" ===
        const scrollBtn = document.getElementById('scroll-to-top');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollBtn.classList.add('visible');
            } else {
                scrollBtn.classList.remove('visible');
            }
        });
        scrollBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // === Поиск: кнопка очистки ===
        const searchInputEl = document.getElementById('searchInput');
        const searchClearEl = document.getElementById('searchClear');
        searchInputEl.addEventListener('input', () => {
            if (searchInputEl.value.length > 0) {
                searchClearEl.classList.add('visible');
            } else {
                searchClearEl.classList.remove('visible');
            }
        });
        searchClearEl.addEventListener('click', () => {
            searchInputEl.value = '';
            searchClearEl.classList.remove('visible');
            searchInputEl.dispatchEvent(new Event('input'));
            searchInputEl.focus();
        });

        // === Клавиатурные сокращения ===
        document.addEventListener('keydown', (e) => {
            // "/" — фокус на поиск
            if (e.key === '/' && document.activeElement !== searchInputEl) {
                e.preventDefault();
                searchInputEl.focus();
            }
            // Escape — очистить поиск (если не открыто модальное окно)
            if (e.key === 'Escape' && document.activeElement === searchInputEl) {
                searchInputEl.blur();
                searchInputEl.value = '';
                searchClearEl.classList.remove('visible');
                searchInputEl.dispatchEvent(new Event('input'));
            }
        });

        // === Header: переключение темы ===
        const headerThemeBtn = document.getElementById('theme-toggle-header');
        headerThemeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('darkTheme', isDark);
            headerThemeBtn.textContent = isDark ? '☀' : '☽';
            themeToggle.innerHTML = isDark ? '[☀]' : '[☽]';
        });
        // Синхронизация с текущим состоянием темы
        if (localStorage.getItem('darkTheme') === 'true') {
            headerThemeBtn.textContent = '☀';
        }

        // === Экспорт в PDF ===
        async function exportToPDF() {
            if (!window.jspdf) {
                const msg = document.createElement('p');
                msg.textContent = '⚠ jsPDF не загружен. Проверьте соединение.';
                msg.style.cssText = 'color:#ff4444;font-size:12px;margin:4px 0;';
                document.getElementById('articleContent').prepend(msg);
                setTimeout(() => msg.remove(), 4000);
                return;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const titleEl = document.querySelector('#articleContent h2');
            const dateEl = document.querySelector('#articleContent p small');
            const title = titleEl ? titleEl.textContent : 'Статья';
            const date = dateEl ? dateEl.textContent : '';
            const content = document.getElementById('articleContent').innerText;

            doc.setFont('courier');
            doc.setFontSize(16);
            doc.text(title, 20, 20);

            doc.setFontSize(10);
            if (date) doc.text(date, 20, 30);

            doc.setFontSize(12);
            const lines = doc.splitTextToSize(content, 170);
            doc.text(lines, 20, date ? 40 : 30);

            doc.save(`TechnoBlog - ${title}.pdf`);
        }

        // Кнопка экспорта в PDF в модальном окне
        const pdfButton = document.createElement('button');
        pdfButton.textContent = '📥 Скачать PDF';
        pdfButton.id = 'exportPdfBtn';
        pdfButton.title = 'Скачать статью в PDF';
        pdfButton.setAttribute('aria-label', 'Скачать статью в PDF');
        pdfButton.onclick = exportToPDF;
        document.querySelector('#articleModal .modal-content').appendChild(pdfButton);

        // === Service Worker ===
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/TechnoBlog/service-worker.js')
                .then(() => console.log('Service Worker зарегистрирован'))
                .catch(err => console.warn('Service Worker не зарегистрирован:', err));
        }
        </script>
